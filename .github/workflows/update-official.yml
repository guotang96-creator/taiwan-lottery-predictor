name: Update Official Lottery Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-official-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Show Node version
        run: node -v

      - name: Fetch official zip files
        run: node scripts/fetch_official.js

      - name: Parse downloaded zip files into raw CSV
        run: node scripts/parse_downloads.js

      - name: Fetch latest official incremental data
        run: node scripts/fetch_latest_official.js

      - name: Convert CSV to JSON
        run: node scripts/convert_to_json.js

      - name: Update latest and sync public files
        run: node scripts/update_official.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add raw_data/*.csv
          git add data/downloads/*
          git add data/extracted/*
          git add data/official/*.json
          git add public/data/official/*.json
          git add scripts/fetch_official.js
          git add scripts/parse_downloads.js
          git add scripts/fetch_latest_official.js
          git add scripts/convert_to_json.js
          git add scripts/update_official.js
          git add package.json package-lock.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update official lottery data"
            git push
          fi
