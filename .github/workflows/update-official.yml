name: Update Official Lottery Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-official-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show Node version
        run: node -v

      - name: Convert CSV to JSON
        run: node scripts/convert_to_json.js

      - name: Update latest and sync public files
        run: node scripts/update_official.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/official/*.json public/data/official/*.json scripts/convert_to_json.js scripts/update_official.js

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update official lottery data"
            git push
          fi
