name: Update Official Lottery Data

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: update-official-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure folders
        run: |
          mkdir -p data/official
          mkdir -p scripts

      - name: Run updater
        run: node scripts/update_official.js

      - name: Show result
        run: |
          echo "---- meta.json ----"
          cat data/official/meta.json || true
          echo
          echo "---- files ----"
          ls -lah data/official || true

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/official/*.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update official lottery data (V67.1 stable)"
          git pull --rebase origin main
          git push origin main