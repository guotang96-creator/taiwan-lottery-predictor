name: Update Official Lottery Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # 每6小時跑一次

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run updater
        run: node scripts/update_official.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "V66.5 keep official data safe"
          git pull --rebase
          git push
