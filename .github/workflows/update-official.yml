name: Update Official Lottery Data

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: update-official-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Ensure folders
        run: |
          mkdir -p data/official
          mkdir -p data/downloads
          mkdir -p data/extracted
          mkdir -p scripts

      - name: Fetch official zip files
        run: node scripts/fetch_official.js

      - name: Parse downloaded zip files
        run: node scripts/parse_downloads.js

      - name: Convert extracted csv to official json
        run: node scripts/convert_to_json.js

      - name: Run updater
        run: node scripts/update_official.js

      - name: Show result
        run: |
          echo "---- download_manifest.json ----"
          cat data/official/download_manifest.json || true
          echo
          echo "---- zip_inventory.json ----"
          cat data/official/zip_inventory.json || true
          echo
          echo "---- meta.json ----"
          cat data/official/meta.json || true
          echo
          echo "---- downloads ----"
          ls -lah data/downloads || true
          echo
          echo "---- extracted ----"
          find data/extracted -maxdepth 2 -type f | sort || true
          echo
          echo "---- files ----"
          ls -lah data/official || true

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json
          git add data/official/*.json
          git add data/downloads/*.zip
          git add data/extracted

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update official lottery data (V68.8 convert json)"
          git pull --rebase origin main
          git push origin main