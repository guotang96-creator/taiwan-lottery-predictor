name: Update Lottery Data

on:
  workflow_dispatch:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: write

jobs:
  update-lottery-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show current time
        run: date

      - name: Ensure folders
        run: |
          mkdir -p docs
          mkdir -p docs/raw_data
          mkdir -p raw_data

      - name: Fetch latest lottery APIs
        run: |
          curl -L "https://api.taiwanlottery.com/TLCAPIWeB/Lottery/BingoResult" -o docs/bingo_api.json || true
          curl -L "https://api.taiwanlottery.com/TLCAPIWeB/Lottery/Daily539Result?period&month=2026-01&endMonth=2026-12&pageNum=1&pageSize=1" -o docs/daily539_api.json || true
          curl -L "https://api.taiwanlottery.com/TLCAPIWeB/Lottery/Lotto649Result?period&month=2026-01&endMonth=2026-12&pageNum=1&pageSize=1" -o docs/biglotto_api.json || true
          curl -L "https://api.taiwanlottery.com/TLCAPIWeB/Lottery/PowerLottoResult?period&month=2026-01&endMonth=2026-12&pageNum=1&pageSize=1" -o docs/power_api.json || true

      - name: Debug fetched files
        run: |
          ls -lah docs || true
          echo "=== bingo_api.json ==="
          wc -c docs/bingo_api.json || true
          head -c 500 docs/bingo_api.json || true
          echo ""
          echo "=== daily539_api.json ==="
          wc -c docs/daily539_api.json || true
          head -c 500 docs/daily539_api.json || true
          echo ""
          echo "=== biglotto_api.json ==="
          wc -c docs/biglotto_api.json || true
          head -c 500 docs/biglotto_api.json || true
          echo ""
          echo "=== power_api.json ==="
          wc -c docs/power_api.json || true
          head -c 500 docs/power_api.json || true
          echo ""

      - name: Build docs/latest.json
        run: |
          node - <<'NODE'
          const fs = require('fs');

          function readJson(path, fallback = {}) {
            try {
              if (!fs.existsSync(path)) return fallback;
              return JSON.parse(fs.readFileSync(path, 'utf8'));
            } catch (_) {
              return fallback;
            }
          }

          function firstNonEmpty(...values) {
            for (const v of values) {
              if (v === null || v === undefined) continue;
              if (Array.isArray(v) && v.length === 0) continue;
              if (typeof v === 'object' && !Array.isArray(v) && Object.keys(v).length === 0) continue;
              return v;
            }
            return null;
          }

          const prevLatest = readJson('docs/latest.json', { content: {} });

          const bingoApi = readJson('docs/bingo_api.json');
          const daily539Api = readJson('docs/daily539_api.json');
          const biglottoApi = readJson('docs/biglotto_api.json');
          const powerApi = readJson('docs/power_api.json');

          const output = {
            updatedAt: new Date().toISOString(),
            content: { ...(prevLatest.content || {}) }
          };

          const bingoLatest = firstNonEmpty(
            bingoApi?.content?.lotteryBingoLatestPost,
            bingoApi?.content?.bingoLatestPost,
            bingoApi?.content?.bingo,
            bingoApi?.content?.bingoQueryResult?.[0],
            prevLatest?.content?.lotteryBingoLatestPost
          );

          const daily539Latest = firstNonEmpty(
            daily539Api?.content?.daily539Res?.[0],
            daily539Api?.content?.daily539LatestPost,
            daily539Api?.content?.daily539,
            prevLatest?.content?.daily539
          );

          const bigLottoLatest = firstNonEmpty(
            biglottoApi?.content?.lotto649Res?.[0],
            biglottoApi?.content?.lotto649LatestPost,
            biglottoApi?.content?.bigLotto,
            prevLatest?.content?.bigLotto
          );

          const powerLatest = firstNonEmpty(
            powerApi?.content?.powerLotto638Res?.[0],
            powerApi?.content?.powerLottoRes?.[0],
            powerApi?.content?.powerLottoLatestPost,
            powerApi?.content?.powerLotto,
            prevLatest?.content?.powerLotto
          );

          if (bingoLatest) {
            output.content.lotteryBingoLatestPost = bingoLatest;
          }

          if (daily539Latest) {
            output.content.daily539 = daily539Latest;
          }

          if (bigLottoLatest) {
            output.content.bigLotto = bigLottoLatest;
          }

          if (powerLatest) {
            output.content.powerLotto = powerLatest;
          }

          fs.writeFileSync('docs/latest.json', JSON.stringify(output, null, 2), 'utf8');
          console.log('docs/latest.json generated');
          console.log(JSON.stringify(output, null, 2));
          NODE

      - name: Mirror latest.json to root if needed
        run: |
          cp docs/latest.json latest.json || true

      - name: Ensure raw_data mirror files exist
        run: |
          cp -f docs/raw_data/bingo.csv raw_data/bingo.csv 2>/dev/null || true
          cp -f docs/raw_data/539.csv raw_data/539.csv 2>/dev/null || true
          cp -f docs/raw_data/biglotto.csv raw_data/biglotto.csv 2>/dev/null || true
          cp -f docs/raw_data/power.csv raw_data/power.csv 2>/dev/null || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update lottery data"
            git push
          fi