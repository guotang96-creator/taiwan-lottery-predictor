name: Update Lottery Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Show repo files
        run: |
          pwd
          ls -la
          ls -la tools || true
          ls -la docs || true
          ls -la docs/raw_data || true

      

      - name: Build latest.json
        run: node tools/build_latest_json.js

      - name: Debug latest.json
        run: |
          echo "===== docs/latest.json ====="
          sed -n '1,220p' docs/latest.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/latest.json docs/raw_data/*.csv tools/build_latest_json.js .github/workflows/update-lottery.yml
          git diff --cached --quiet || git commit -m "chore: update lottery data"

      - name: Push changes
        run: git push
