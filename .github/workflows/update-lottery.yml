name: Update Lottery

on:
  workflow_dispatch:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: write

jobs:
  update-lottery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Ensure folders
        run: |
          mkdir -p docs
          mkdir -p docs/raw_data
          mkdir -p raw_data

      - name: Update bingo.csv fast
        run: node parse_bingo_fast.js

      - name: Fetch latest official JSON
        run: npm run fetch:latest || true

      - name: Build latest.json from current data
        run: |
          node - <<'NODE'
          const fs = require('fs');

          function readJson(path, fallback = {}) {
            try {
              if (!fs.existsSync(path)) return fallback;
              return JSON.parse(fs.readFileSync(path, 'utf8'));
            } catch (_) {
              return fallback;
            }
          }

          function readText(path) {
            try {
              if (!fs.existsSync(path)) return '';
              return fs.readFileSync(path, 'utf8');
            } catch (_) {
              return '';
            }
          }

          function parseCSV(text) {
            if (!text || !text.trim()) return [];
            const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/).filter(Boolean);
            if (lines.length < 2) return [];
            const headers = lines[0].split(',');
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
              const cols = lines[i].split(',');
              const row = {};
              headers.forEach((h, idx) => {
                row[h] = cols[idx] ?? '';
              });
              rows.push(row);
            }
            return rows;
          }

          function latestBingoFromCsv(path) {
            const rows = parseCSV(readText(path));
            if (!rows.length) return null;
            rows.sort((a, b) => String(b.period || '').localeCompare(String(a.period || ''), 'zh-Hant-u-kn-true'));
            const row = rows[0];
            const nums = [];
            for (let i = 1; i <= 20; i++) {
              const n = Number(row[`n${i}`]);
              if (Number.isFinite(n)) nums.push(n);
            }
            if (!nums.length) return null;
            return {
              drawTerm: row.period || '',
              dDate: row.drawDate || '',
              drawNumberSize: nums
            };
          }

          function pickFirst(obj, keys) {
            for (const key of keys) {
              if (obj && obj[key] !== undefined && obj[key] !== null) return obj[key];
            }
            return null;
          }

          const prev = readJson('docs/latest.json', { content: {} });
          const official = readJson('official_latest.json', {});

          const latest = {
            updatedAt: new Date().toISOString(),
            content: {}
          };

          const bingo = latestBingoFromCsv('docs/raw_data/bingo.csv') || prev.content?.lotteryBingoLatestPost;
          const daily539 = pickFirst(official.content || {}, ['daily539', 'daily539LatestPost']) || prev.content?.daily539;
          const bigLotto = pickFirst(official.content || {}, ['bigLotto', 'lotto649LatestPost']) || prev.content?.bigLotto;
          const powerLotto = pickFirst(official.content || {}, ['powerLotto', 'powerLottoLatestPost']) || prev.content?.powerLotto;

          if (bingo) latest.content.lotteryBingoLatestPost = bingo;
          if (daily539) latest.content.daily539 = daily539;
          if (bigLotto) latest.content.bigLotto = bigLotto;
          if (powerLotto) latest.content.powerLotto = powerLotto;

          fs.writeFileSync('docs/latest.json', JSON.stringify(latest, null, 2), 'utf8');
          fs.writeFileSync('latest.json', JSON.stringify(latest, null, 2), 'utf8');
          console.log('latest.json updated');
          NODE

      - name: Mirror raw_data if needed
        run: |
          cp -f docs/raw_data/bingo.csv raw_data/bingo.csv 2>/dev/null || true
          cp -f docs/raw_data/539.csv raw_data/539.csv 2>/dev/null || true
          cp -f docs/raw_data/biglotto.csv raw_data/biglotto.csv 2>/dev/null || true
          cp -f docs/raw_data/power.csv raw_data/power.csv 2>/dev/null || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update lottery"
            git push
          fi