name: Update Bingo Fast

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

jobs:
  update-bingo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show current time
        run: date

      - name: Ensure folders
        run: |
          mkdir -p docs
          mkdir -p docs/raw_data

      - name: Fetch bingo data
        run: |
          curl -L "https://api.taiwanlottery.com/TLCAPIWeB/Lottery/BingoResult" -o docs/bingo_api.json || true

      - name: Update latest timestamp
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'docs/latest.json';
          let data = {};
          if (fs.existsSync(path)) {
            try {
              data = JSON.parse(fs.readFileSync(path, 'utf8'));
            } catch (_) {
              data = {};
            }
          }
          data.updatedAt = new Date().toISOString();
          fs.writeFileSync(path, JSON.stringify(data, null, 2), 'utf8');
          console.log('latest.json updated');
          NODE

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update bingo fast"
            git push
          fi