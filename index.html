<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>台灣彩券 AI 預測系統</title>
  <meta name="theme-color" content="#081224" />
  <meta name="description" content="台灣彩券 AI 預測系統｜Bingo、今彩539、大樂透、威力彩｜首頁入口＋儀表板總覽＋命中追蹤＋資料狀態" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./style.css?v=89" />
  <style>
    :root{
      --bg1:#06101f;
      --bg2:#0b1730;
      --panel:#1f2940;
      --panel2:#23314d;
      --soft:#dfe8e6;
      --text:#eef4ff;
      --muted:#aab7d1;
      --line:rgba(255,255,255,.08);
      --accent1:#62e2f5;
      --accent2:#29d866;
      --purple1:#bb74ff;
      --purple2:#7c39ff;
      --shadow:0 12px 30px rgba(0,0,0,.28);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      background:
        radial-gradient(circle at top, rgba(40,185,214,.18), transparent 35%),
        linear-gradient(180deg, #071021 0%, #091427 35%, #07101f 100%);
      min-height:100vh;
    }

    .app-shell{
      width:min(980px, calc(100% - 28px));
      margin:22px auto 120px;
    }

    .hero-card,
    .section-card,
    .result-card,
    .v84-panel,
    .v84-section,
    .v84-kpi-card,
    .v84-recent-item,
    .latest-five-item,
    .group-item{
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .hero-card,
    .section-card,
    .v84-panel,
    .v84-section{
      background:linear-gradient(180deg, rgba(31,41,64,.95), rgba(28,37,58,.95));
      border-radius:var(--radius);
    }

    .hero-card{
      padding:24px;
      margin-bottom:20px;
    }

    .hero-top{
      display:flex;
      gap:18px;
      align-items:center;
      margin-bottom:20px;
    }

    .app-logo{
      width:78px;
      height:78px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:900;
      color:#fff;
      background:linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow:0 10px 24px rgba(31,231,137,.18);
      flex:0 0 auto;
    }

    .hero-title{
      margin:0;
      font-size:clamp(28px, 5vw, 52px);
      line-height:1.06;
      font-weight:900;
      letter-spacing:.5px;
    }

    .hero-subtitle{
      margin:8px 0 0;
      color:var(--muted);
      font-size:clamp(15px, 2.8vw, 20px);
      line-height:1.5;
    }

    .hero-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .hero-actions button,
    .primary-btn,
    .secondary-btn,
    .toolbar-btn,
    .nav-pill,
    .quick-btn{
      border:0;
      border-radius:22px;
      cursor:pointer;
      font-weight:900;
      font-size:18px;
      transition:transform .15s ease, opacity .15s ease, box-shadow .15s ease;
    }

    .hero-actions button:hover,
    .primary-btn:hover,
    .secondary-btn:hover,
    .toolbar-btn:hover,
    .quick-btn:hover{
      transform:translateY(-1px);
      opacity:.96;
    }

    .hero-actions .primary,
    .primary-btn{
      background:linear-gradient(135deg, var(--accent1), var(--accent2));
      color:#061120;
      padding:18px 20px;
    }

    .hero-actions .secondary,
    .secondary-btn,
    .toolbar-btn,
    .quick-btn{
      background:rgba(255,255,255,.08);
      color:#fff;
      padding:18px 20px;
      border:1px solid rgba(255,255,255,.06);
    }

    .section-card{
      padding:24px;
      margin-bottom:20px;
    }

    .chip-row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:18px;
    }

    .chip{
      padding:12px 18px;
      border-radius:999px;
      font-weight:800;
      font-size:16px;
      background:rgba(255,255,255,.08);
      color:#f5f7ff;
      border:1px solid rgba(255,255,255,.08);
    }

    .section-title{
      margin:0 0 8px;
      font-size:clamp(28px, 6vw, 54px);
      line-height:1.04;
      font-weight:900;
    }

    .section-desc{
      margin:0 0 18px;
      color:var(--muted);
      font-size:clamp(15px, 2.8vw, 19px);
      line-height:1.75;
    }

    .action-stack{
      display:grid;
      gap:14px;
      margin-top:10px;
    }

    .control-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
      margin-top:16px;
    }

    .field{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:14px 16px;
    }

    .field label{
      display:block;
      font-size:14px;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:800;
    }

    .field select{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:#fff;
      font-size:18px;
      font-weight:800;
    }

    .result-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin:18px 0 14px;
    }

    .result-title{
      margin:0;
      font-size:24px;
      font-weight:900;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.1);
      color:#fff;
      font-size:14px;
      font-weight:800;
    }

    .v84-toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin:14px 0 18px;
    }

    .toolbar-btn{
      padding:14px 18px;
    }

    .v84-kpi-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
      margin-top:16px;
    }

    .v84-kpi-card{
      background:rgba(255,255,255,.06);
      border-radius:24px;
      padding:18px;
    }

    .v84-kpi-label{
      font-size:14px;
      color:var(--muted);
      font-weight:800;
      margin-bottom:8px;
    }

    .v84-kpi-value{
      font-size:30px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:8px;
    }

    .v84-kpi-note{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .v84-mini-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-top:16px;
    }

    .v84-mini-stat{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-weight:800;
      color:#eaf1ff;
    }

    .v84-mini-stat span{
      color:var(--muted);
      font-size:14px;
      font-weight:800;
    }

    .v84-mini-stat strong{
      font-size:24px;
      font-weight:900;
    }

    .v84-recent-wrap{
      margin-top:18px;
    }

    .v84-recent-title{
      margin:0 0 10px;
      font-size:18px;
      font-weight:900;
    }

    .v84-recent-list{
      display:grid;
      gap:12px;
    }

    .v84-recent-item{
      background:rgba(255,255,255,.05);
      border-radius:20px;
      padding:14px 16px;
    }

    .v84-main{
      display:grid;
      gap:18px;
    }

    .v84-section{
      padding:22px;
    }

    .v84-section-head h3{
      margin:0 0 6px;
      font-size:22px;
      font-weight:900;
    }

    .v84-section-head p{
      margin:0 0 16px;
      color:var(--muted);
      line-height:1.6;
    }

    .result-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .result-card{
      background:var(--soft);
      color:#1d2740;
      border-radius:24px;
      padding:18px 18px 20px;
      min-height:110px;
    }

    .result-card.full-width{
      grid-column:1 / -1;
    }

    .highlight-card{
      background:linear-gradient(180deg, #e8f7ef, #dff2e8);
    }

    .card-title{
      font-size:20px;
      font-weight:900;
      margin-bottom:12px;
      color:#0f1a32;
    }

    .text-block{
      font-size:16px;
      line-height:1.7;
      color:#34435f;
      word-break:break-word;
    }

    .ball-row{
      display:flex;
      flex-wrap:wrap;
      gap:12px 14px;
      align-items:center;
    }

    .ball{
      width:62px;
      height:62px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:900;
      color:#fff;
      background:linear-gradient(180deg, #28d45c, #1ab34a);
      box-shadow:inset 0 -6px 0 rgba(0,0,0,.12);
    }

    .ball.main{
      background:linear-gradient(180deg, #28d45c, #1ab34a);
    }

    .ball.special{
      background:linear-gradient(180deg, var(--purple1), var(--purple2));
    }

    .special-box{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-start;
      margin-left:4px;
      color:#1d2740;
      font-weight:900;
    }

    .group-list{
      display:grid;
      gap:14px;
    }

    .group-item{
      background:rgba(255,255,255,.04);
      border-radius:20px;
      padding:14px;
    }

    .group-label{
      font-size:15px;
      font-weight:900;
      margin-bottom:10px;
      color:#b6c3da;
    }

    .latest-five-list{
      display:grid;
      gap:14px;
    }

    .latest-five-item{
      background:rgba(255,255,255,.03);
      border-radius:24px;
      padding:16px;
    }

    .latest-five-issue{
      margin-bottom:14px;
      color:#b8c5da;
      font-size:16px;
      line-height:1.6;
      font-weight:800;
    }

    .text-muted{
      color:#b2bed4;
    }

    .empty-state{
      padding:24px;
      text-align:center;
    }

    .empty-icon{
      font-size:34px;
      margin-bottom:10px;
    }

    .empty-title{
      font-size:22px;
      font-weight:900;
      margin-bottom:10px;
    }

    .empty-text{
      color:var(--muted);
      line-height:1.7;
    }

    .section-anchor{
      position:relative;
      top:-90px;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:max(12px, env(safe-area-inset-bottom));
      width:min(940px, calc(100% - 20px));
      background:linear-gradient(90deg, rgba(3,14,33,.98), rgba(5,31,55,.98), rgba(4,11,39,.98));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      box-shadow:0 18px 40px rgba(0,0,0,.35);
      padding:14px 12px;
      z-index:999;
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
    }

    .nav-pill{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:78px;
      background:transparent;
      color:#fff;
      text-decoration:none;
      padding:10px 8px;
    }

    .nav-pill.active{
      background:rgba(255,255,255,.10);
    }

    .nav-pill .icon{
      font-size:28px;
      line-height:1;
    }

    .nav-pill .label{
      font-size:15px;
      font-weight:900;
    }

    @media (max-width: 760px){
      .app-shell{
        width:calc(100% - 18px);
        margin:14px auto 110px;
      }

      .hero-card,
      .section-card,
      .v84-section,
      .v84-panel{
        border-radius:24px;
      }

      .hero-card,
      .section-card,
      .v84-section{
        padding:18px;
      }

      .hero-top{
        align-items:flex-start;
      }

      .app-logo{
        width:72px;
        height:72px;
        font-size:22px;
      }

      .hero-actions{
        grid-template-columns:1fr 1fr;
      }

      .control-grid,
      .result-grid,
      .v84-kpi-grid,
      .v84-mini-grid{
        grid-template-columns:1fr;
      }

      .ball{
        width:56px;
        height:56px;
        font-size:20px;
      }

      .bottom-nav{
        width:calc(100% - 16px);
        gap:8px;
        padding:12px 10px;
      }

      .nav-pill{
        min-height:72px;
      }

      .nav-pill .icon{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="hero-card">
      <div class="hero-top">
        <div class="app-logo">AI</div>
        <div>
          <h1 class="hero-title">台灣彩券 AI 預測系統</h1>
          <p class="hero-subtitle">V89｜首頁入口＋儀表板總覽＋命中追蹤＋資料狀態</p>
        </div>
      </div>

      <div class="hero-actions">
        <button class="primary" type="button" onclick="document.getElementById('controlSection').scrollIntoView({behavior:'smooth'})">快速開始</button>
        <button class="secondary" type="button" onclick="document.getElementById('predictionSection').scrollIntoView({behavior:'smooth'})">查看結果</button>
      </div>
    </section>

    <section class="section-card">
      <div class="chip-row">
        <span class="chip">商用首頁</span>
        <span class="chip">系統運作中</span>
        <span class="chip" id="v84CurrentGameBadge">尚未選擇彩種</span>
      </div>

      <h2 class="section-title">一頁式首頁，直接進入實戰預測</h2>
      <p class="section-desc">
        整合 Bingo、今彩 539、大樂透、威力彩，保留預測、回測、命中追蹤與資料狀態功能，首頁可直接切換彩種與開始分析。
      </p>

      <div class="action-stack">
        <button class="primary-btn" type="button" onclick="runPrediction(document.getElementById('lotterySelect').value)">立即預測</button>
        <button class="secondary-btn" type="button" onclick="document.getElementById('lotterySelect').focus()">選擇彩種</button>
        <button class="secondary-btn" type="button" onclick="document.getElementById('predictionSection').scrollIntoView({behavior:'smooth'})">查看分析</button>
      </div>
    </section>

    <section class="section-card" id="controlSection">
      <div class="chip-row">
        <span class="chip" id="v84SiteStateBadge">系統待命中</span>
        <span class="chip">首頁資訊精簡版</span>
      </div>

      <h2 class="section-title" style="font-size:clamp(24px,5.2vw,42px);">直接選彩種，快速進入預測</h2>
      <p class="section-desc">先設定彩種、組數與歷史期數，再開始執行預測。</p>

      <div class="control-grid">
        <div class="field">
          <label for="lotterySelect">彩種</label>
          <select id="lotterySelect">
            <option value="bingo">Bingo Bingo</option>
            <option value="539">今彩539</option>
            <option value="649">大樂透</option>
            <option value="638">威力彩</option>
          </select>
        </div>

        <div class="field">
          <label for="setCount">推薦組數</label>
          <select id="setCount">
            <option value="1">1 組</option>
            <option value="2">2 組</option>
            <option value="3" selected>3 組</option>
            <option value="4">4 組</option>
            <option value="5">5 組</option>
          </select>
        </div>

        <div class="field">
          <label for="historyPeriods">歷史期數</label>
          <select id="historyPeriods">
            <option value="30">30 期</option>
            <option value="50" selected>50 期</option>
            <option value="100">100 期</option>
            <option value="120">120 期</option>
          </select>
        </div>

        <div class="field">
          <label for="bingoCount">Bingo 預測顆數</label>
          <select id="bingoCount">
            <option value="4">4 顆</option>
            <option value="5">5 顆</option>
            <option value="6">6 顆</option>
            <option value="7">7 顆</option>
            <option value="8">8 顆</option>
            <option value="9">9 顆</option>
            <option value="10" selected>10 顆</option>
          </select>
        </div>
      </div>

      <div class="v84-toolbar">
        <button id="v84SaveBtn" class="toolbar-btn" type="button">儲存本次預測</button>
        <button id="v84ClearBtn" class="toolbar-btn" type="button">清空命中紀錄</button>
        <button id="v84TopBtn" class="toolbar-btn" type="button">回到頂部</button>
        <button class="primary-btn" type="button" onclick="runPrediction(document.getElementById('lotterySelect').value)">開始預測</button>
      </div>
    </section>

    <section class="section-card">
      <div class="result-head">
        <h2 class="result-title">儀表板總覽</h2>
        <div class="badge" id="resultBadge">待預測</div>
      </div>

      <div class="v84-kpi-grid" id="v84HeroKpis"></div>
      <div class="v84-mini-grid" id="v84MiniStats"></div>

      <div class="v84-recent-wrap">
        <h3 class="v84-recent-title">最近操作</h3>
        <div class="v84-recent-list" id="v84RecentOps"></div>
      </div>
    </section>

    <section class="section-card" id="predictionSection">
      <div class="result-head">
        <h2 class="result-title" id="resultGameName">V89｜請先選擇彩種並開始預測</h2>
        <div class="badge" id="v84TrackingStateText">待機中</div>
      </div>

      <div class="chip-row">
        <span class="chip" id="v84DataStateText">待載入</span>
        <span class="chip" id="v84LastUpdateText">尚未取得</span>
      </div>

      <div id="predictionResult">
        <div class="v84-panel">
          <div class="empty-state">
            <div class="empty-icon">🎯</div>
            <div class="empty-title">準備開始預測</div>
            <div class="empty-text">請先選擇彩種，然後按下「開始預測」。</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a class="nav-pill" href="javascript:void(0)" onclick="window.scrollTo({top:0,behavior:'smooth'})">
      <span class="icon">🏠</span>
      <span class="label">首頁</span>
    </a>
    <a class="nav-pill" href="javascript:void(0)" onclick="document.getElementById('controlSection').scrollIntoView({behavior:'smooth'})">
      <span class="icon">🎯</span>
      <span class="label">預測</span>
    </a>
    <a class="nav-pill" href="javascript:void(0)" onclick="document.getElementById('predictionSection').scrollIntoView({behavior:'smooth'})">
      <span class="icon">📊</span>
      <span class="label">結果</span>
    </a>
    <a class="nav-pill active" href="javascript:void(0)" onclick="document.getElementById('anchor-latest')?.scrollIntoView({behavior:'smooth'}) || document.getElementById('predictionSection').scrollIntoView({behavior:'smooth'})">
      <span class="icon">🕘</span>
      <span class="label">最新</span>
    </a>
  </nav>

  <script src="./app.js?v=89"></script>
</body>
</html>
