<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣彩券預測助手 V40</title>
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="台灣彩券預測助手 V40，支援賓果、大樂透、威力彩、今彩539，含AI分析、冷門反彈、拖牌與命中率回測。" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <h1>台灣彩券預測助手 V40</h1>
        <p>AI混合｜熱門/冷門/均衡｜拖牌強化｜命中率回測</p>
      </div>
      <button id="installBtn" class="install-btn hidden">安裝 App</button>
    </header>

    <section class="panel">
      <div class="form-grid">
        <label>
          彩券類型
          <select id="game">
            <option value="bingo">賓果 Bingo</option>
            <option value="lotto">大樂透</option>
            <option value="power">威力彩</option>
            <option value="539">今彩539</option>
          </select>
        </label>

        <label>
          歷史期數
          <select id="historyCount">
            <option value="10">近10期</option>
            <option value="20">近20期</option>
            <option value="30" selected>近30期</option>
            <option value="50">近50期</option>
          </select>
        </label>

        <label id="bingoPickWrap">
          賓果選幾顆
          <select id="bingoPickCount">
            <option value="1">1顆</option>
            <option value="2">2顆</option>
            <option value="3">3顆</option>
            <option value="4">4顆</option>
            <option value="5">5顆</option>
            <option value="6" selected>6顆</option>
            <option value="7">7顆</option>
            <option value="8">8顆</option>
            <option value="9">9顆</option>
            <option value="10">10顆</option>
          </select>
        </label>

        <label>
          推薦組數
          <select id="groupCount">
            <option value="1">1組</option>
            <option value="3">3組</option>
            <option value="5" selected>5組</option>
            <option value="10">10組</option>
          </select>
        </label>

        <label>
          出生年月日
          <input id="birthday" type="date" value="1993-08-19" />
        </label>

        <label>
          分析模式
          <select id="mode">
            <option value="ai" selected>AI混合模式</option>
            <option value="hot">熱門強化</option>
            <option value="cold">冷門反彈</option>
            <option value="balanced">均衡模式</option>
            <option value="birthday">偏財生日模式</option>
          </select>
        </label>
      </div>

      <div class="btn-row btn-row-4">
        <button id="loadBtn">讀取歷史資料</button>
        <button id="analyzeBtn">開始分析</button>
        <button id="backtestBtn">命中率回測</button>
        <button id="battleBtn">進入實戰</button>
      </div>

      <div id="status" class="status">請先讀取資料</div>
      <div class="tip">本工具屬統計分析參考，不保證中獎，請理性使用。</div>
    </section>

    <section class="cards">
      <div class="card wide">
        <h2>V40 推薦號碼</h2>
        <div id="result"></div>
      </div>

      <div class="card">
        <h2>偏財生日號碼</h2>
        <div id="birthdayNumbers"></div>
      </div>

      <div class="card">
        <h2>AI 分數排行榜</h2>
        <div id="aiScoreBoard"></div>
      </div>

      <div class="card">
        <h2>熱門號碼</h2>
        <div id="hotNumbers"></div>
      </div>

      <div class="card">
        <h2>冷門號碼</h2>
        <div id="coldNumbers"></div>
      </div>

      <div class="card">
        <h2>尾數分析</h2>
        <div id="tailAnalysis"></div>
      </div>

      <div class="card">
        <h2>拖號分析</h2>
        <div id="dragAnalysis"></div>
      </div>

      <div class="card">
        <h2>連號偵測</h2>
        <div id="serialAnalysis"></div>
      </div>

      <div class="card">
        <h2>Bingo 建議</h2>
        <div id="bingoAdvice"></div>
      </div>

      <div class="card wide">
        <h2>命中率回測</h2>
        <div id="backtestResult"></div>
      </div>

      <div class="card wide">
        <h2>最近開獎</h2>
        <div id="latestDraws"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
