<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣彩券 AI 預測系統 V69.4</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>🎯 台灣彩券 AI 預測系統</h1>
        <p class="subtitle">官方資料版｜Bingo・大樂透・威力彩・539｜V69.4</p>
      </div>
    </header>

    <main class="main-wrap">
      <section class="panel control-panel">
        <h2>預測設定</h2>

        <div class="form-grid">
          <div class="field">
            <label for="setCount">推薦組數</label>
            <select id="setCount">
              <option value="1">1組</option>
              <option value="2">2組</option>
              <option value="3" selected>3組</option>
              <option value="5">5組</option>
            </select>
          </div>

          <div class="field">
            <label for="historyPeriods">分析歷史期數</label>
            <select id="historyPeriods">
              <option value="30">近30期</option>
              <option value="50" selected>近50期</option>
              <option value="80">近80期</option>
              <option value="100">近100期</option>
              <option value="150">近150期</option>
              <option value="200">近200期</option>
            </select>
          </div>

          <div class="field">
            <label for="bingoCount">Bingo 選幾顆</label>
            <select id="bingoCount">
              <option value="1">1顆</option>
              <option value="2">2顆</option>
              <option value="3">3顆</option>
              <option value="4">4顆</option>
              <option value="5">5顆</option>
              <option value="6">6顆</option>
              <option value="7">7顆</option>
              <option value="8">8顆</option>
              <option value="9">9顆</option>
              <option value="10" selected>10顆</option>
            </select>
          </div>
        </div>

        <div class="action-row">
          <button class="lottery-btn" onclick="runPrediction('bingo')">預測 Bingo</button>
          <button class="lottery-btn" onclick="runPrediction('649')">預測大樂透</button>
          <button class="lottery-btn" onclick="runPrediction('638')">預測威力彩</button>
          <button class="lottery-btn" onclick="runPrediction('539')">預測 539</button>
        </div>
      </section>

      <section class="panel result-panel">
        <div class="result-header">
          <div>
            <h2>預測結果</h2>
            <p id="resultGameName" class="result-subtitle">請先選擇彩種並開始預測</p>
          </div>
          <div class="badge-group">
            <span id="resultBadge" class="badge">待預測</span>
            <span id="confidenceBadge" class="badge confidence-badge confidence-normal">可信度：待分析</span>
          </div>
        </div>

        <div id="predictionResult" class="prediction-result">
          <div class="empty-state">
            <div class="empty-icon">📊</div>
            <div class="empty-title">尚未產生預測</div>
            <div class="empty-text">按上方按鈕後，這裡會顯示主推薦、熱號、冷號、連號、尾數分析等資訊。</div>
          </div>
        </div>
      </section>

      <section class="panel tracking-panel">
        <div class="result-header">
          <div>
            <h2>命中追蹤</h2>
            <p class="result-subtitle">自動比對上一筆預測與本機模擬開獎結果</p>
          </div>
          <span id="hitBadge" class="badge">待比對</span>
        </div>

        <div id="hitTrackingResult" class="prediction-result">
          <div class="empty-state">
            <div class="empty-icon">🎯</div>
            <div class="empty-title">尚無命中資料</div>
            <div class="empty-text">每次產生預測時，系統會保存一筆紀錄，供後續命中統計使用。</div>
          </div>
        </div>
      </section>

      <section class="panel stats-panel">
        <div class="result-header">
          <div>
            <h2>命中統計面板</h2>
            <p class="result-subtitle">近 10 次表現、平均命中、最佳紀錄、彩種排行榜</p>
          </div>
          <span id="statsBadge" class="badge">統計中</span>
        </div>

        <div id="statsPanelContent" class="prediction-result">
          <div class="empty-state">
            <div class="empty-icon">📈</div>
            <div class="empty-title">尚無統計資料</div>
            <div class="empty-text">開始預測後，這裡會累積你的歷史命中表現。</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
